<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Pets: Bomber Online</title>
    <style>
        :root {
            --bg: #090a14;
            --panel: #14162e;
            --accent: #00d2ff;
            --danger: #ff4757;
            --warning: #f1c40f;
            --border: #3b427a;
            --success: #2ecc71;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; user-select: none; touch-action: none; }

        #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 50px; height: 50px; border: 5px solid #252952; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 10; background: radial-gradient(circle, #1a1c3a, #090a14); overflow-y: auto; }
        h1 { color: var(--accent); text-shadow: 0 0 10px var(--accent); font-size: 26px; margin-bottom: 5px; text-align: center; font-weight: 900; letter-spacing: 1px; }

        .gold-display { background: rgba(241, 196, 15, 0.15); border: 2px solid var(--warning); color: var(--warning); padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 0 10px rgba(241, 196, 15, 0.3); display: flex; align-items: center; gap: 6px; }

        .input-group { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        input { width: 100%; height: 44px; background: #202447; border: 2px solid var(--border); border-radius: 10px; color: white; padding: 0 15px; font-size: 14px; outline: none; text-align: center; font-weight: bold; }
        input:focus { border-color: var(--accent); }

        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; max-width: 320px; margin-bottom: 10px; }
        .char-card { position: relative; background: var(--panel); border: 2px solid var(--border); border-radius: 12px; padding: 6px; display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; transition: all 0.2s; }
        .char-card img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 4px; }
        .char-card span { font-size: 10px; font-weight: bold; color: #fff; }
        .char-card .lvl-badge { position: absolute; top: 2px; right: 2px; background: var(--warning); color: black; font-size: 8px; font-weight: bold; padding: 1px 4px; border-radius: 4px; }
        .char-card.selected { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,210,255,0.5); background: #1b244a; }

        .btn-upgrade { width: 100%; max-width: 320px; height: 38px; background: var(--success); color: white; font-weight: bold; font-size: 12px; margin-bottom: 12px; border-radius: 8px; display: none; border: none; cursor: pointer; }
        .btn-upgrade:disabled { background: #34495e; color: #7f8c8d; cursor: not-allowed; }

        #char-desc { font-size: 11px; color: #ccc; text-align: center; margin-bottom: 12px; line-height: 1.4; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; width: 100%; max-width: 320px; border: 1px solid #252952; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 320px; margin-bottom: 8px; }
        .btn-triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; max-width: 320px; margin-bottom: 8px; }
        
        button { width: 100%; height: 46px; border: none; border-radius: 10px; font-weight: 900; font-size: 14px; cursor: pointer; color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        button:disabled { background: #555 !important; color: #aaa !important; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .btn-blue { background: var(--accent); color: #000; }
        .btn-purple { background: #9b59b6; color: #fff; }
        .btn-orange { background: #e67e22; color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--panel); border: 2px solid var(--border); border-radius: 16px; padding: 15px; width: 100%; max-width: 320px; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 18px; color: var(--warning); font-weight: bold; text-align: center; margin-bottom: 12px; }
        .lvl-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }

        #game-screen { display: none; background: #0c0d1f; flex-direction: column; justify-content: space-between; padding: 0; }
        .top-bar { width: 100%; height: 45px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #22264f; }
        .room-info { font-size: 12px; font-weight: bold; color: var(--warning); }

        #arena-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 5px; position: relative; }
        canvas { background: #1a1c38; border: 3px solid #3b427a; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.6); max-width: 96vw; max-height: 52vh; }

        .controls { height: 160px; background: var(--panel); border-top: 2px solid #22264f; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .dpad { position: relative; width: 135px; height: 135px; }
        .dbtn { position: absolute; width: 46px; height: 46px; background: #252952; border: 2px solid #41488c; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; color: white; }
        .dbtn:active { background: var(--accent); color: black; }
        .d-up { top: 0; left: 45px; }
        .d-down { bottom: 0; left: 45px; }
        .d-left { top: 45px; left: 0; }
        .d-right { top: 45px; right: 0; }

        .action-btns { display: flex; gap: 15px; align-items: center; }
        .act-btn { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 30px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 5px 12px rgba(0,0,0,0.4); }
        .act-btn:active { transform: scale(0.88); }
        .btn-bomb { background: #e74c3c; border: 2px solid #c0392b; }
        .btn-ability { background: #9b59b6; border: 2px solid #8e44ad; position: relative; }
        .btn-ability:disabled { background: #34495e; border-color: #2c3e50; opacity: 0.5; }

        #lobby-list { font-size: 13px; color: #fff; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; width: 100%; max-width: 320px; border: 1px solid #3b427a; }
        .lobby-p { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px dashed #3b427a; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div style="font-weight: bold; color: var(--accent);">Karakterler Yükleniyor...</div>
    </div>

    <div id="lobby-screen" class="screen" style="display:none;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 10px; width: 100%; max-width: 320px;">
            <h1>THE PETS: BOMBER</h1>
            <div class="gold-display">🪙 ALTININIZ: <span id="gold-amount">0</span></div>
        </div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Takma Adın" maxlength="10">
            <input type="text" id="room-id" placeholder="Oda Kodu Girin" maxlength="9">
        </div>

        <div class="char-grid" id="char-card-container"></div>
        <button id="upgrade-btn" class="btn-upgrade" onclick="upgradeCharacter()">YÜKSELT (100 🪙)</button>
        <div id="char-desc">Yükleniyor...</div>

        <button class="btn-purple" style="width:100%; max-width:320px; margin-bottom:8px;" onclick="joinCustomRoom()">ODAYA KATIL / ODA KUR</button>
        
        <div class="btn-triple">
            <button class="btn-orange" onclick="startMatchmaking(2)">RASTGELE 2</button>
            <button class="btn-orange" onclick="startMatchmaking(3)">RASTGELE 3</button>
            <button class="btn-orange" onclick="startMatchmaking(4)">RASTGELE 4</button>
        </div>
        <div class="btn-group" style="width:100%; max-width:320px; margin-bottom:8px;">
            <button class="btn-blue" style="background: #34495e; color: #fff; height:40px; font-size:11px;" onclick="toggleModal(true)">🏅 LVELLER</button>
            <button class="btn-danger" style="height:40px; font-size:11px; background:#c0392b;" onclick="resetAccount()">🔄 HESABI SIFIRLA</button>
        </div>
        <button id="btn-start" style="display:none; background:var(--success); margin-top: 8px;" onclick="startGame()" disabled>OYUNCU BEKLENİYOR... ⏳</button>
        <div id="lobby-list" style="display:none;">
            <div id="lobby-status-title" style="font-weight:bold; color:var(--accent); margin-bottom:6px;">Odadaki Oyuncular:</div>
            <div id="players-container"></div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-bar">
            <div class="room-info" id="hud-room-id">ODA: ----</div>
            <div id="game-status" style="font-size:12px; font-weight:bold; color:#fff;">Savaş Başladı!</div>
            <button onclick="leaveGame()" style="width:65px; height:30px; font-size:11px; background:#444; color:#fff; margin:0; box-shadow:none;">ÇIK ⬅</button>
        </div>
        <div id="arena-container">
            <canvas id="bomber-canvas"></canvas>
        </div>
        <div class="controls">
            <div class="dpad">
                <div class="dbtn d-up" data-dir="up">▲</div>
                <div class="dbtn d-down" data-dir="down">▼</div>
                <div class="dbtn d-left" data-dir="left">◀</div>
                <div class="dbtn d-right" data-dir="right">▶</div>
            </div>
            <div class="action-btns">
                <button class="act-btn btn-ability" id="action-skill" onclick="useCharacterAbility()">🌟</button>
                <button class="act-btn btn-bomb" onclick="placeBomb()">💣</button>
            </div>
        </div>
    </div>

    <div id="char-modal" class="modal" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title">KARAKTER SEVİYELERİ</div>
            <div id="modal-list-container"></div>
            <button class="btn-blue" style="margin-top:12px; height:40px;" onclick="toggleModal(false)">KAPAT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update, remove, runTransaction, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PETS_DATA = {
            squeak: { name: "SQUEAK", img: "squeak.webp", desc: "5 sn boyunca basma gecikmesini siler, ultra hızlı koşar!", emoji: "⚡" },
            gus:     { name: "GUS",     img: "gus.webp",    desc: "2 saniye boyunca hiçbir patlamadan hasar almaz!", emoji: "🛡️" },
            blinky:  { name: "BLINKY",  img: "blinky.webp", desc: "Önündeki bombayı haritanın sonuna kadar tekmeler!", emoji: "👟" },
            flip:    { name: "FLIP",    img: "flip.webp",   desc: "Son bombayı anında patlatır! Patlama alanı +1 genişler!", emoji: "💥" },
            sugar:   { name: "SUGAR",   img: "sugar.webp",  desc: "Önünde duran kırılabilir tuğlayı 1 kare ileri iter!", emoji: "📦" },
            dot:     { name: "DOT",     img: "dot.webp",    desc: "Uzaktan kumandalı bomba bırakır, tuşla patlatır!", emoji: "🎮" },
            yeyet:   { name: "YEYET",   img: "yeyet.webp",  desc: "3 saniyeliğine tuğlaların içinden geçebilir!", emoji: "👻" },
            moosey:  { name: "MOOSEY",  img: "moosey.webp", desc: "Bir sonraki bombasını devasa yapar, menzili +4 artar!", emoji: "🍉" },
            blook:   { name: "BLOOK",   img: "blook.webp",  desc: "Yere görünmez buz tuzağı kurar. Basan 2 sn donar!", emoji: "❄️" }
        };

        let myId = null; let myRoom = null; let currentRoomData = null; let selectedCharacter = "squeak";
        let canvas, ctx; let mapSize = 13; let tileSize = 24; let imgCache = {}; let isMovingCooldown = false;
        let charLevels = {}; let myGold = 0; let roomListenerRef = null; let botInterval = null;
        let audioCtx = null; let musicInterval = null;
        let lastDirection = "down"; let myActiveBombId = null;

        function loadPlayerData() {
            Object.keys(PETS_DATA).forEach(key => {
                let lvl = localStorage.getItem(`bomber_lvl_${key}`); charLevels[key] = lvl ? parseInt(lvl) : 1;
            });
            let gold = localStorage.getItem("bomber_gold");
            myGold = gold ? parseInt(gold) : 0;
            document.getElementById('gold-amount').innerText = myGold;
        }
        loadPlayerData();

        const savedName = localStorage.getItem("bomber_username");
        if (savedName) { document.getElementById('username').value = savedName; }

        window.resetAccount = async function() {
            if(confirm("Hesabını sıfırlamak ve çıkış yapmak istediğine emin misin?")) {
                if(roomListenerRef) off(roomListenerRef);
                if(myRoom && myId) { try { await remove(ref(db, `bomber_rooms/${myRoom}/players/${myId}`)); } catch(e) {} }
                localStorage.clear(); sessionStorage.clear(); stopMusic(); location.reload();
            }
        };

        function preloadImages() {
            const promises = Object.keys(PETS_DATA).map(key => {
                return new Promise((resolve) => {
                    let img = new Image(); img.src = PETS_DATA[key].img;
                    img.onload = () => { imgCache[key] = img; resolve(); }; img.onerror = () => { resolve(); };
                });
            });
            Promise.all(promises).then(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'flex';
                buildCharGrid();
            });
        }

        function buildCharGrid() {
            let grid = document.getElementById('char-card-container'); grid.innerHTML = "";
            Object.keys(PETS_DATA).forEach(key => {
                let p = PETS_DATA[key]; let card = document.createElement('div');
                card.className = `char-card ${key === selectedCharacter ? 'selected' : ''}`;
                card.onclick = () => { selectedCharacter = key; buildCharGrid(); };
                card.innerHTML = `<div class="lvl-badge">Lvl ${charLevels[key]}</div><img src="${p.img}"><span>${p.name}</span>`;
                grid.appendChild(card);
            });
            
            document.getElementById('char-desc').innerText = PETS_DATA[selectedCharacter].name + " (Lvl " + charLevels[selectedCharacter] + "): " + PETS_DATA[selectedCharacter].desc;
            
            let upgradeBtn = document.getElementById('upgrade-btn'); upgradeBtn.style.display = "block";
            let currentLvl = charLevels[selectedCharacter];
            if(currentLvl >= 5) { upgradeBtn.disabled = true; upgradeBtn.innerText = "MAKSİMUM SEVİYE (LVL 5)"; }
            else if(myGold < 100) { upgradeBtn.disabled = true; upgradeBtn.innerText = "YETERSİZ ALTIN (100 🪙)"; }
            else { upgradeBtn.disabled = false; upgradeBtn.innerText = `YÜKSELT (100 🪙)`; }
        }
        preloadImages();

        window.upgradeCharacter = function() {
            let currentLvl = charLevels[selectedCharacter];
            if(myGold >= 100 && currentLvl < 5) {
                myGold -= 100; charLevels[selectedCharacter] = currentLvl + 1;
                localStorage.setItem("bomber_gold", myGold);
                localStorage.setItem(`bomber_lvl_${selectedCharacter}`, charLevels[selectedCharacter]);
                document.getElementById('gold-amount').innerText = myGold;
                alert(`🏅 ${PETS_DATA[selectedCharacter].name} Seviye ${currentLvl + 1} oldu!`);
                buildCharGrid();
            }
        };

        window.toggleModal = function(show) {
            let modal = document.getElementById('char-modal'); modal.style.display = show ? 'flex' : 'none';
            if(show) {
                let container = document.getElementById('modal-list-container'); container.innerHTML = "";
                Object.keys(PETS_DATA).forEach(k => {
                    container.innerHTML += `<div class="lvl-row"><span><b>${PETS_DATA[k].name}</b></span><span>Seviye: ${charLevels[k]}/5</span></div>`;
                });
            }
        };

        function generateRandomRoomCode() {
            let code = ""; for(let i=0; i<9; i++) { code += Math.floor(Math.random() * 10).toString(); } return code;
        }

        window.joinCustomRoom = function() {
            let name = document.getElementById('username').value.trim(); let room = document.getElementById('room-id').value.trim();
            if(!name) { alert("Lütfen takma adını gir!"); return; }
            localStorage.setItem("bomber_username", name);
            
            // Eğer kod yazılmadıysa otomatik oda kurar, yazıldıysa o odaya bağlanır.
            let targetRoom = room.length === 9 ? room : generateRandomRoomCode();
            enterRoom(name, targetRoom, 4);
        };

        window.startMatchmaking = function(targetPlayers) {
            let name = document.getElementById('username').value.trim(); if(!name) { alert("Lütfen takma adını gir!"); return; }
            localStorage.setItem("bomber_username", name);
            document.getElementById('lobby-status-title').innerText = `Rastgele ${targetPlayers}'li Eşleşme Aranıyor...`;
            document.getElementById('lobby-list').style.display = 'block';

            get(ref(db, 'bomber_rooms')).then((snapshot) => {
                let rooms = snapshot.val(); let foundRoom = null;
                if(rooms) {
                    for(let rId in rooms) {
                        let room = rooms[rId];
                        let pKeys = Object.keys(room.players || {});
                        if (pKeys.length === 0) { remove(ref(db, `bomber_rooms/${rId}`)); continue; }
                        if(room.status === "waiting" && room.targetCount === targetPlayers) {
                            if(pKeys.length < targetPlayers) { foundRoom = rId; break; }
                        }
                    }
                }
                if(foundRoom) { enterRoom(name, foundRoom, targetPlayers); } 
                else { enterRoom(name, generateRandomRoomCode(), targetPlayers); }
            });
        };

        function enterRoom(name, roomCode, maxPlayers) {
            if(roomListenerRef) off(roomListenerRef);
            if (!sessionStorage.getItem("bomber_player_id")) {
                sessionStorage.setItem("bomber_player_id", "p_" + Math.random().toString(36).substr(2, 4));
            }
            myId = sessionStorage.getItem("bomber_player_id"); myRoom = roomCode;

            document.getElementById('lobby-status-title').innerHTML = `ODA KODU: <span style="color:#f1c40f; font-size:20px; letter-spacing:2px; font-weight:900;">${myRoom}</span>`;
            document.getElementById('lobby-list').style.display = 'block';

            roomListenerRef = ref(db, 'bomber_rooms/' + myRoom);
            runTransaction(roomListenerRef, (currentData) => {
                if (currentData === null) {
                    return {
                        status: "waiting", targetCount: maxPlayers, map: generateMap(), createdAt: Date.now(),
                        players: { [myId]: { name: name, character: selectedCharacter, x: 1, y: 1, isAlive: true, abilityReady: true, isBot: false, isSpeedy: false, isGod: false, isGhost: false, isFrozen: false } }
                    };
                } else {
                    if(currentData.status === "playing") return;
                    if (currentData.players && currentData.players[myId]) {
                        currentData.players[myId].name = name; currentData.players[myId].character = selectedCharacter;
                        return currentData;
                    }
                    let pKeys = Object.keys(currentData.players || {}); if(pKeys.length >= currentData.targetCount) return;
                    let spawnPoints = [{x:1,y:1}, {x:11,y:1}, {x:1,y:11}, {x:11,y:11}]; let pos = spawnPoints[pKeys.length] || {x:1,y:1};
                    currentData.players[myId] = { name: name, character: selectedCharacter, x: pos.x, y: pos.y, isAlive: true, abilityReady: true, isBot: false, isSpeedy: false, isGod: false, isGhost: false, isFrozen: false };
                    return currentData;
                }
            }).then(() => { listenRoom(); });
        }

        function generateMap() {
            let m = [];
            for(let y=0; y<mapSize; y++) {
                for(let x=0; x<mapSize; x++) {
                    if(x===0 || y===0 || x===mapSize-1 || y===mapSize-1) { m.push(1); }
                    else if(x%2===0 && y%2===0) { m.push(1); }
                    else if((x<3 && y<3) || (x>9 && y<3) || (x<3 && y>9) || (x>9 && y>9)) { m.push(0); }
                    else { m.push(Math.random() > 0.4 ? 2 : 0); }
                }
            }
            return m;
        }

        function listenRoom() {
            onValue(roomListenerRef, (snapshot) => {
                const data = snapshot.val(); if(!data) return; currentRoomData = data;

                if (data.players) {
                    let pKeys = Object.keys(data.players); let nameCounts = {};
                    pKeys.forEach(k => { let pName = data.players[k].name; if (pName) { nameCounts[pName] = (nameCounts[pName] || 0) + 1; } });
                    let myName = data.players[myId] ? data.players[myId].name : null;
                    if (myName && nameCounts[myName] > 1) { alert(`⚠️ Odada zaten "${myName}" isminde bir oyuncu var!`); leaveGame(); return; }
                }

                if(data.status === "waiting") {
                    let pKeys = Object.keys(data.players || {}); let container = document.getElementById('players-container'); container.innerHTML = "";
                    pKeys.forEach((k, idx) => {
                        let p = data.players[k]; container.innerHTML += `<div class="lobby-p"><span>${idx+1}. ${p.name} ${p.isBot?'[BOT]':''}</span><b>HAZIR</b></div>`;
                    });
                    let btnStart = document.getElementById('btn-start'); if(pKeys[0] === myId) { btnStart.style.display = 'block'; }
                    if(pKeys.length === data.targetCount) {
                        btnStart.disabled = false; btnStart.style.background = "var(--success)"; btnStart.innerText = "OYUNU BAŞLAT 🚀";
                        if(pKeys[0] === myId) { startGame(); }
                    } else {
                        btnStart.disabled = true; btnStart.style.background = "#555"; btnStart.innerText = `OYUNCU BEKLENİYOR (${pKeys.length}/${data.targetCount})... ⏳`;
                    }
                } else if(data.status === "playing") {
                    if(document.getElementById('lobby-screen').style.display !== 'none') { setupGameCanvas(); startBotAI(); startMusic(); }
                    drawArena();
                }
            });
        }

        window.startGame = function() {
            if(!currentRoomData) return; let pKeys = Object.keys(currentRoomData.players || {}); if(pKeys.length < currentRoomData.targetCount) return;
            update(roomListenerRef, { status: "playing" });
        };

        function setupGameCanvas() {
            document.getElementById('lobby-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('hud-room-id').innerText = "ODA: " + myRoom;
            canvas = document.getElementById('bomber-canvas'); ctx = canvas.getContext('2d');
            let renderSize = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.52, 340); canvas.width = renderSize; canvas.height = renderSize;
            tileSize = renderSize / mapSize; setupTouchControls();
        }

        function startMusic() {
            try {
                if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                if(audioCtx.state === 'suspended') { audioCtx.resume(); }
                const notes = [110, 130, 146, 165, 110, 130, 165, 146, 110, 110, 196, 165, 146, 130, 146, 165];
                let step = 0;
                musicInterval = setInterval(() => {
                    if(!audioCtx || currentRoomData?.status !== "playing") return;
                    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2); step++;
                }, 200);
            } catch(e) { console.log("Müzik hatası:", e); }
        }

        function stopMusic() {
            if(musicInterval) clearInterval(musicInterval);
            if(audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
        }

        function startBotAI() {
            if(botInterval) clearInterval(botInterval);
            botInterval = setInterval(() => {
                if(!currentRoomData || currentRoomData.status !== "playing") return;
                let pKeys = Object.keys(currentRoomData.players || {}); if(pKeys[0] !== myId) return;

                pKeys.forEach(pId => {
                    let bot = currentRoomData.players[pId]; if(!bot.isBot || !bot.isAlive || bot.isFrozen) return;
                    let dangerZones = getDangerZones(); let inDanger = dangerZones.some(z => z.x === bot.x && z.y === bot.y);

                    if(inDanger) {
                        let safeMoves = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}].map(d => ({x:bot.x+d.x, y:bot.y+d.y}))
                            .filter(m => isCellPassable(m.x, m.y, bot))
                            .filter(m => !dangerZones.some(z => z.x === m.x && z.y === m.y));
                        if(safeMoves.length > 0) {
                            let nextMove = safeMoves[Math.floor(Math.random() * safeMoves.length)];
                            update(ref(db, `bomber_rooms/${myRoom}/players/${pId}`), { x: nextMove.x, y: nextMove.y });
                        }
                    } else {
                        let directions = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}]; let nearWallOrPlayer = false;
                        directions.forEach(d => {
                            let tx = bot.x + d.x, ty = bot.y + d.y;
                            if(currentRoomData.map[ty * mapSize + tx] === 2) nearWallOrPlayer = true;
                        });

                        if(nearWallOrPlayer && Math.random() > 0.5) {
                            let bid = "b_bot_" + Math.random().toString(36).substr(2,3);
                            update(ref(db, `bomber_rooms/${myRoom}/bombs/${bid}`), { x: bot.x, y: bot.y, owner: pId, range: 2, isMega: false });
                            setTimeout(() => { explodeBomb(bid); }, 2500);
                        } else {
                            let validMoves = directions.map(d => ({x:bot.x+d.x, y:bot.y+d.y})).filter(m => isCellPassable(m.x, m.y, bot));
                            if(validMoves.length > 0) {
                                let move = validMoves[Math.floor(Math.random() * validMoves.length)];
                                update(ref(db, `bomber_rooms/${myRoom}/players/${pId}`), { x: move.x, y: move.y });
                            }
                        }
                    }
                });
            }, 350);
        }

        function getDangerZones() {
            let zones = []; let bombs = currentRoomData.bombs || {};
            for(let bid in bombs) {
                let b = bombs[bid]; zones.push({x:b.x, y:b.y});
                let dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
                dirs.forEach(d => {
                    for(let i=1; i<=2; i++) {
                        let cx = b.x + d.x*i, cy = b.y + d.y*i; if(currentRoomData.map[cy*mapSize + cx] === 1) break;
                        zones.push({x:cx, y:cy});
                    }
                });
            }
            return zones;
        }

        function isCellPassable(x, y, player) {
            if(x < 0 || x >= mapSize || y < 0 || y >= mapSize) return false;
            let tile = currentRoomData.map[y * mapSize + x];
            if(tile === 1) return false;
            if(tile === 2 && !player.isGhost) return false;

            let bombs = currentRoomData.bombs || {};
            for(let bid in bombs) {
                let b = bombs[bid];
                if(b.x === x && b.y === y) {
                    if(player.x === x && player.y === y) return true;
                    return false;
                }
            }
            return true;
        }

        function drawArena() {
            if(!ctx || !currentRoomData) return; ctx.clearRect(0,0,canvas.width, canvas.height);
            let map = currentRoomData.map; let players = currentRoomData.players;
            let bombs = currentRoomData.bombs || {}; let explosions = currentRoomData.explosions || {};
            let traps = currentRoomData.traps || {};

            for(let y=0; y<mapSize; y++) {
                for(let x=0; x<mapSize; x++) {
                    let tile = map[y * mapSize + x];
                    if(tile === 1) { ctx.fillStyle = "#25294a"; ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize); } 
                    else if(tile === 2) { ctx.fillStyle = "#8e44ad"; ctx.fillRect(x*tileSize, y*tileSize, tileSize-1, tileSize-1); }
                }
            }

            for(let tid in traps) {
                let t = traps[tid];
                if(t.owner === myId) {
                    ctx.fillStyle = "rgba(0, 210, 255, 0.4)";
                    ctx.fillRect(t.x*tileSize+4, t.y*tileSize+4, tileSize-8, tileSize-8);
                }
            }

            for(let bid in bombs) {
                let b = bombs[bid];
                ctx.fillStyle = b.isMega ? "#ff0066" : "#ff3838"; 
                ctx.beginPath(); ctx.arc((b.x+0.5)*tileSize, (b.y+0.5)*tileSize, b.isMega ? tileSize*0.46 : tileSize*0.38, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ff7675"; ctx.beginPath(); ctx.arc((b.x+0.42)*tileSize, (b.y+0.42)*tileSize, tileSize*0.12, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo((b.x+0.5)*tileSize, (b.y+0.2)*tileSize); ctx.lineTo((b.x+0.62)*tileSize, (b.y+0.1)*tileSize); ctx.stroke();
                ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.arc((b.x+0.62)*tileSize, (b.y+0.1)*tileSize, 3, 0, Math.PI*2); ctx.fill();
            }

            for(let eid in explosions) {
                let exp = explosions[eid]; if(exp.cells) {
                    ctx.fillStyle = "rgba(255, 71, 87, 0.85)"; exp.cells.forEach(c => { ctx.fillRect(c.x*tileSize, c.y*tileSize, tileSize, tileSize); });
                }
            }

            for(let pid in players) {
                let p = players[pid]; if(!p.isAlive) continue;
                ctx.save(); ctx.beginPath(); ctx.arc((p.x+0.5)*tileSize, (p.y+0.5)*tileSize, tileSize*0.42, 0, Math.PI*2); ctx.clip();
                if(imgCache[p.character]) { ctx.drawImage(imgCache[p.character], p.x*tileSize, p.y*tileSize, tileSize, tileSize); } 
                else { ctx.fillStyle = (pid === myId) ? "#00d2ff" : "#ff4757"; ctx.fill(); }
                ctx.restore();

                let strokeColor = p.isBot ? "#e67e22" : ((pid === myId) ? "#00d2ff" : "#ff4757");
                if(p.isGod) strokeColor = "#f1c40f"; 
                if(p.isGhost) strokeColor = "rgba(255,255,255,0.6)"; 
                if(p.isFrozen) strokeColor = "#00ffff"; 

                ctx.strokeStyle = strokeColor; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.arc((p.x+0.5)*tileSize, (p.y+0.5)*tileSize, tileSize*0.42, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.font = "bold 8px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(p.isBot ? `🤖 ${p.name}` : p.name, (p.x+0.5)*tileSize, (p.y+0.18)*tileSize);
            }
        }

        function setupTouchControls() {
            document.querySelectorAll('.dbtn').forEach(btn => {
                btn.ontouchstart = (e) => { e.preventDefault(); handleMove(btn.getAttribute('data-dir')); };
                btn.onmousedown = () => { handleMove(btn.getAttribute('data-dir')); };
            });
            let myChar = currentRoomData.players[myId].character;
            document.getElementById('action-skill').innerText = PETS_DATA[myChar].emoji;
        }

        function handleMove(dir) {
            if(!currentRoomData || !currentRoomData.players[myId].isAlive) return;
            let me = currentRoomData.players[myId]; if(me.isFrozen || isMovingCooldown) return;
            
            lastDirection = dir; 
            let tx = me.x, ty = me.y; 
            if(dir === 'up') ty--; if(dir === 'down') ty++; if(dir === 'left') tx--; if(dir === 'right') tx++;
            
            if(isCellPassable(tx, ty, me)) {
                isMovingCooldown = true; 
                let speed = me.isSpeedy ? 40 : 150; 
                setTimeout(() => { isMovingCooldown = false; }, speed);
                
                update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { x: tx, y: ty });
                checkTraps(tx, ty);
            }
        }

        function checkTraps(x, y) {
            let traps = currentRoomData.traps || {};
            for(let tid in traps) {
                let t = traps[tid];
                if(t.x === x && t.y === y) {
                    remove(ref(db, `bomber_rooms/${myRoom}/traps/${tid}`));
                    update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isFrozen: true });
                    setTimeout(() => {
                        update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isFrozen: false });
                    }, 2000); 
                }
            }
        }

        window.placeBomb = function() {
            if(!currentRoomData || !currentRoomData.players[myId].isAlive) return;
            let me = currentRoomData.players[myId]; if(me.isFrozen) return;

            let bid = "b_" + Math.random().toString(36).substr(2, 4);
            myActiveBombId = bid;

            let isMegaActive = me.isMegaReady || false;
            let bombRange = isMegaActive ? 6 : 2;

            if(isMegaActive) update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isMegaReady: false });

            update(ref(db, `bomber_rooms/${myRoom}/bombs/${bid}`), { x: me.x, y: me.y, owner: myId, range: bombRange, isMega: isMegaActive });
            
            if(me.character !== "dot") {
                setTimeout(() => { explodeBomb(bid); }, 3000);
            }
        };

        window.useCharacterAbility = function() {
            if(!currentRoomData || !currentRoomData.players[myId].isAlive) return;
            let me = currentRoomData.players[myId]; if(!me.abilityReady || me.isFrozen) return;

            let char = me.character;
            let btn = document.getElementById('action-skill');
            btn.disabled = true;
            update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { abilityReady: false });

            if(char === "squeak") {
                update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isSpeedy: true });
                setTimeout(() => { update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isSpeedy: false }); }, 5000);
            } 
            else if(char === "gus") {
                update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isGod: true });
                setTimeout(() => { update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isGod: false }); }, 2000);
            }
            else if(char === "blinky") {
                let tx = me.x, ty = me.y;
                if(lastDirection === 'up') ty--; if(lastDirection === 'down') ty++; if(lastDirection === 'left') tx--; if(lastDirection === 'right') tx++;
                let bombs = currentRoomData.bombs || {};
                for(let bid in bombs) {
                    if(bombs[bid].x === tx && bombs[bid].y === ty) {
                        let fx = tx, fy = ty;
                        while(currentRoomData.map[(fy + (lastDirection==='down'?1:lastDirection==='up'?-1:0)) * mapSize + (fx + (lastDirection==='right'?1:lastDirection==='left'?-1:0))] === 0) {
                            if(lastDirection === 'up') fy--; if(lastDirection === 'down') fy++; if(lastDirection === 'left') fx--; if(lastDirection === 'right') fx++;
                        }
                        update(ref(db, `bomber_rooms/${myRoom}/bombs/${bid}`), { x: fx, y: fy });
                        break;
                    }
                }
            }
            else if(char === "flip") {
                if(myActiveBombId && currentRoomData.bombs && currentRoomData.bombs[myActiveBombId]) {
                    let b = currentRoomData.bombs[myActiveBombId];
                    update(ref(db, `bomber_rooms/${myRoom}/bombs/${myActiveBombId}`), { range: (b.range || 2) + 1 }).then(() => {
                        explodeBomb(myActiveBombId);
                    });
                }
            }
            else if(char === "sugar") {
                let tx = me.x, ty = me.y;
                if(lastDirection === 'up') ty--; if(lastDirection === 'down') ty++; if(lastDirection === 'left') tx--; if(lastDirection === 'right') tx++;
                let targetIdx = ty * mapSize + tx;
                if(currentRoomData.map[targetIdx] === 2) {
                    let nx = tx, ny = ty;
                    if(lastDirection === 'up') ny--; if(lastDirection === 'down') ny++; if(lastDirection === 'left') nx--; if(lastDirection === 'right') nx++;
                    if(currentRoomData.map[ny * mapSize + nx] === 0) {
                        let newMap = [...currentRoomData.map];
                        newMap[targetIdx] = 0; newMap[ny * mapSize + nx] = 2;
                        update(ref(db, `bomber_rooms/${myRoom}`), { map: newMap });
                    }
                }
            }
            else if(char === "dot") {
                if(myActiveBombId && currentRoomData.bombs && currentRoomData.bombs[myActiveBombId]) {
                    explodeBomb(myActiveBombId);
                }
                setTimeout(() => { btn.disabled = false; update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { abilityReady: true }); }, 1000);
                return;
            }
            else if(char === "yeyet") {
                update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isGhost: true });
                setTimeout(() => { update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isGhost: false }); }, 3000);
            }
            else if(char === "moosey") {
                update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isMegaReady: true });
            }
            else if(char === "blook") {
                let tid = "t_" + Math.random().toString(36).substr(2,4);
                update(ref(db, `bomber_rooms/${myRoom}/traps/${tid}`), { x: me.x, y: me.y, owner: myId });
            }

            setTimeout(() => {
                btn.disabled = false;
                update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { abilityReady: true });
            }, 7000);
        };

        function explodeBomb(bid) {
            if(!currentRoomData || !currentRoomData.bombs || !currentRoomData.bombs[bid]) return;
            let b = currentRoomData.bombs[bid]; let range = b.range || 2;
            let cells = [{ x: b.x, y: b.y }]; let directions = [{x:0,y:-1}, {x:0,y:1}, {x:-1,y:0}, {x:1,y:0}];
            let updatedMap = [...currentRoomData.map];

            directions.forEach(d => {
                for(let i=1; i<=range; i++) {
                    let cx = b.x + d.x*i; let cy = b.y + d.y*i; let idx = cy * mapSize + cx;
                    if(updatedMap[idx] === 1) break; cells.push({ x: cx, y: cy });
                    if(updatedMap[idx] === 2) { updatedMap[idx] = 0; break; }
                }
            });

            remove(ref(db, `bomber_rooms/${myRoom}/bombs/${bid}`)); update(ref(db, `bomber_rooms/${myRoom}`), { map: updatedMap });
            let eid = "e_" + Math.random().toString(36).substr(2, 4); set(ref(db, `bomber_rooms/${myRoom}/explosions/${eid}`), { cells: cells });

            let players = currentRoomData.players;
            for(let pid in players) {
                let p = players[pid]; if(!p.isAlive || p.isGod) continue; 
                cells.forEach(c => {
                    if(p.x === c.x && p.y === c.y) {
                        update(ref(db, `bomber_rooms/${myRoom}/players/${pid}`), { isAlive: false });
                        if(pid === myId) { alert("ELENDİNİZ! 💀"); }
                    }
                });
            }
            setTimeout(() => { remove(ref(db, `bomber_rooms/${myRoom}/explosions/${eid}`)); checkVictoryConditions(); }, 500);
        }

        function checkVictoryConditions() {
            if(!currentRoomData || currentRoomData.status !== "playing") return;
            let players = currentRoomData.players; let alivePlayers = []; let winnerId = null;
            for(let pid in players) { if(players[pid].isAlive) { alivePlayers.push(players[pid]); winnerId = pid; } }
            
            if(alivePlayers.length === 1) {
                let winnerName = alivePlayers[0].name;
                if(winnerId === myId) {
                    myGold += 10; localStorage.setItem("bomber_gold", myGold);
                    document.getElementById('gold-amount').innerText = myGold;
                    alert(`🏆 TEBRİKLER KAZANDINIZ! 🏆\n🎁 +10 Altın Kazandınız!`);
                } else { alert(`MAÇ BİTTİ!\nKazanan: ${winnerName} 🏆`); }
                leaveGame();
            } else if(alivePlayers.length === 0) { alert("HERKES PATLADI! BERABERE 💥"); leaveGame(); }
        }

        window.leaveGame = async function() {
            stopMusic();
            if(botInterval) clearInterval(botInterval);
            if(myRoom && myId) {
                if(roomListenerRef) off(roomListenerRef);
                if(currentRoomData && currentRoomData.status === "playing") {
                    try { await update(ref(db, `bomber_rooms/${myRoom}/players/${myId}`), { isBot: true, name: "ZorluBot" }); } catch(e){}
                } else {
                    try { await remove(ref(db, `bomber_rooms/${myRoom}/players/${myId}`)); } catch(e){}
                }
            }
            location.reload();
        };
    </script>
